                    background: linear-gradient(-45deg, #0f9b0f, #00c6ff, #f9d423, #1e3c72);
                    background-size: 400% 400%;
                    animation: gradientMove 12s ease infinite;
                    color: white;
                }

                @keyframes gradientMove {
                    0% { background-position: 0% 50%; }
                    50% { background-position: 100% 50%; }
                    100% { background-position: 0% 50%; }
                }

                h1 {
                    text-align: center;
                    font-size: 65px;
                    margin-bottom: 10px;
                    font-weight: 900;
                    letter-spacing: 4px;
                    background: linear-gradient(90deg, gold, yellow, white);

                    -webkit-text-fill-color: transparent;
                    text-shadow: 0 0 30px rgba(255,215,0,0.8);
                    animation: glowPulse 2s infinite alternate;
                }

                @keyframes glowPulse {
                    from { text-shadow: 0 0 15px gold; }
                    to { text-shadow: 0 0 40px yellow, 0 0 60px white; }
                }

                .subtitle {
                    text-align: center;
                    margin-bottom: 50px;
                    font-size: 18px;
                    letter-spacing: 3px;
                    opacity: 0.9;
                }

                .container {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                    gap: 30px;
                }

                .card {
                    background: rgba(255, 255, 255, 0.15);
                    backdrop-filter: blur(15px);
                    border-radius: 25px;
                    overflow: hidden;
                    transition: all 0.4s ease;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                }

                .card:hover {
                    transform: translateY(-12px) scale(1.05);
                    box-shadow: 0 0 40px rgba(255,255,0,0.9);
                }

                .card img {
                    width: 100%;
                    height: 260px;
                    object-fit: cover;
                }

                .card h3 {
                    text-align: center;
                    padding: 20px;
                    font-size: 20px;
                    color: yellow;
                    letter-spacing: 1px;
                }

                footer {
                    text-align: center;
                    margin-top: 60px;
                    opacity: 0.8;
                    font-size: 14px;
                }

            </style>
        </head>
